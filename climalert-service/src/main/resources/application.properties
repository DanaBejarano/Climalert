server.port=8080
spring.application.name=climalert-service
spring.threads.virtual.enabled=true

# ==============================
# WeatherAPI (proveedor externo)
# ==============================
# Consigue tu API key gratis en https://www.weatherapi.com/
weatherapi.base-url=https://api.weatherapi.com/v1
weatherapi.key=TU_API_KEY_ACA
weatherapi.location=CABA

# ==============================
# Base de datos H2 (archivo local, persiste entre reinicios)
# ==============================
spring.datasource.url=jdbc:h2:file:./data/climalert;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true

# ==============================
# Envio de mail via SMTP (ejemplo con Gmail)
# ==============================
# Necesitas generar una "contraseña de aplicacion" en:
# https://myaccount.google.com/apppasswords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=danabejarano7@gmail.com
spring.mail.password=tu_contraseña_de_aplicacion
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
